services:
  jaeger:
    image: jaegertracing/all-in-one:1.66.0
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - corebank

networks:
  corebank:
    driver: bridge
